<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Oliveira_OTM">
  
  <title>Oliveira_OTM</title>
  
  <style>
    /* Reset para aparência de Aplicativo */
    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      user-select: none; /* Impede selecionar texto, como num app real */
    }
    
    body {
      margin: 0; padding: 0;
      background-color: #000;
      color: white;
      font-family: -apple-system, system-ui, sans-serif;
      height: 100vh; width: 100vw;
      display: flex; justify-content: center;
      overflow: hidden;
    }

    #particles-js {
      position: fixed;
      width: 100%; height: 100%;
      z-index: 1;
      top: 0; left: 0;
    }

    .app-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 60px 20px 20px 20px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 25px;
      letter-spacing: -1.5px;
    }

    .nav-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-item {
      flex: 1; padding: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #333;
      border-radius: 12px;
      color: #777;
      text-align: center;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-item.active { background: #fff; color: #000; border-color: #fff; }

    .main-card {
      background: rgba(20, 20, 20, 0.95);
      padding: 25px;
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(25px);
      width: 100%;
      max-height: 65vh;
      overflow-y: auto;
    }

    .content-section { display: none; }
    .content-section.active { display: block; }

    /* Input Preto Total e Vazio */
    input[type="text"] {
      width: 100%;
      padding: 20px;
      background: #000 !important;
      border: 1px solid #333;
      border-radius: 15px;
      color: #fff;
      font-size: 18px;
      text-align: center;
      margin-bottom: 20px;
      -webkit-appearance: none; /* Remove bordas padrão iOS */
    }

    .btn-action {
      width: 100%;
      padding: 18px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 15px;
      font-weight: 800;
      font-size: 18px;
    }

    /* Funções */
    .section-title { font-size: 12px; color: #555; text-transform: uppercase; margin: 15px 0 10px 0; font-weight: 800; }
    .function-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
    
    /* Switch iOS */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .3s; border-radius: 30px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #fff; }
    input:checked + .slider:before { transform: translateX(20px); background-color: #000; }

    /* Botão de Download do Perfil */
    .footer-download { margin-top: auto; padding-bottom: 30px; }
    .btn-download {
      width: 100%;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border: 1px solid #333;
      border-radius: 12px;
      font-weight: 600;
      text-decoration: none;
      display: flex; align-items: center; justify-content: center;
    }

    #status-msg { text-align: center; margin-top: 15px; font-size: 13px; font-weight: 700; }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="app-container">
    <div class="header">
      <h1>Oliveira_OTM</h1>
    </div>

    <div class="nav-tabs">
      <div class="tab-item active" id="tab-ativacao">Ativação</div>
      <div class="tab-item" id="tab-painel">Painel OTM</div>
    </div>

    <div class="main-card">
      <div id="sec-ativacao" class="content-section active">
        <p style="text-align:center; color:#888;">Insira o seu código de acesso privado</p>
        <input type="text" id="input-codigo" spellcheck="false" autocomplete="off">
        <button class="btn-action" id="btn-ativar">Activate Agora</button>
        <div id="status-msg"></div>
      </div>

      <div id="sec-painel" class="content-section">
        <div class="section-title">Performance Celular</div>
        <div class="function-row"><span>Limpar RAM Profundo</span><label class="switch"><input type="checkbox"> <span class="slider"></span></label></div>
        <div class="function-row"><span>Overclock GPU (Virtual)</span><label class="switch"><input type="checkbox"> <span class="slider"></span></label></div>
        <div class="function-row"><span>Priorizar FPS Gaming</span><label class="switch"><input type="checkbox"> <span class="slider"></span></label></div>
        <div class="function-row"><span>Estabilizar Ping 5G/Wi-Fi</span><label class="switch"><input type="checkbox"> <span class="slider"></span></label></div>
        <div style="margin-top: 20px;">
          <button class="btn-action" id="apply-btn">Aplicar no Sistema</button>
        </div>
      </div>
    </div>

    <div class="footer-download">
      <a href="gvotimizacao-webclip.mobileconfig" class="btn-download">
        📲 Instalar Perfil Diretamente
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  
  <script>
    // Partículas Brilhantes Nítidas
    particlesJS('particles-js', {
      "particles": {
        "number": { "value": 120, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#ffffff" },
        "opacity": { "value": 0.9, "random": true },
        "size": { "value": 3, "random": true },
        "line_linked": { "enable": true, "distance": 130, "color": "#ffffff", "opacity": 0.5, "width": 1.5 },
        "move": { "enable": true, "speed": 2.5 }
      }
    });

    const CODIGO_VALIDO = "68fbde36f576351f1378c5d5";
    const input = document.getElementById('input-codigo');
    const btnAtivar = document.getElementById('btn-ativar');
    const msg = document.getElementById('status-msg');
    const secAtivacao = document.getElementById('sec-ativacao');
    const secPainel = document.getElementById('sec-painel');

    // Ao clicar em ativar
    btnAtivar.onclick = () => {
      if(input.value.trim() === CODIGO_VALIDO) {
        msg.style.color = "#44ff44";
        msg.innerText = "✅ SISTEMA ATIVADO!";
        localStorage.setItem('auth_final', 'true');
        setTimeout(() => {
            document.getElementById('tab-painel').click();
        }, 1000);
      } else {
        msg.style.color = "#ff4444";
        msg.innerText = "❌ CÓDIGO INCORRETO";
      }
    };

    // Navegação entre abas
    document.getElementById('tab-ativacao').onclick = function() {
        this.classList.add('active');
        document.getElementById('tab-painel').classList.remove('active');
        secAtivacao.classList.add('active');
        secPainel.classList.remove('active');
    };

    document.getElementById('tab-painel').onclick = function() {
        if(localStorage.getItem('auth_final') === 'true') {
            this.classList.add('active');
            document.getElementById('tab-ativacao').classList.remove('active');
            secPainel.classList.add('active');
            secAtivacao.classList.remove('active');
        } else {
            msg.innerText = "❌ ATIVE ANTES DE ENTRAR";
        }
    };
  </script>
</body>
</html>
