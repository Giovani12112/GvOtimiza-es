<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#121631">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Oliveira_OTM">
  <title>Oliveira_OTM</title>
  
  <style>
    /* Fundo de partículas fixo */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      background-color: #0d0d0d;
      z-index: -1;
      top: 0;
      left: 0;
    }

    /* Filtro global Preto e Branco */
    html {
      filter: grayscale(100%);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    /* Lógica visual das abas */
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* Estilo básico para os botões de aba */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab-button {
      padding: 10px 20px;
      cursor: pointer;
      background: #222;
      color: white;
      border: none;
      border-radius: 5px;
    }
    .tab-button.active {
      background: #444;
      font-weight: bold;
    }
  </style>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="particles-js"></div>

  <main class="phone">
    <header class="hero">
      <h1>Oliveira_OTM</h1>
    </header>

    <nav class="tabs">
      <button class="tab-button active" data-tab="activationTab">Ativação</button>
      <button class="tab-button" data-tab="featuresTab">Painel OTM</button>
    </nav>

    <section class="tab-content active" id="activationTab">
      <div class="activation-card" style="text-align: center; padding: 20px;">
        <p class="subtitle">Insira seu código privado</p>
        <input id="codeInput" type="text" maxlength="24" placeholder="Coloque seu código aqui" style="padding: 10px; width: 80%;" />
        <br><br>
        <button id="activateButton" type="button" style="padding: 10px 20px;">Ativar Código</button>
        <p id="resultMessage"></p>
      </div>
    </section>

    <section class="tab-content" id="featuresTab">
      
      <div class="settings" style="padding: 20px;">
        <h2>Funções de Otimização</h2>
        <article class="setting-item" style="display: flex; justify-content: space-between; margin-bottom: 15px;">
          <span>Otimização de Memória</span>
          <label class="switch"><input type="checkbox" data-key="memoria"><span></span></label>
        </article>
        <article class="setting-item" style="display: flex; justify-content: space-between; margin-bottom: 15px;">
          <span>Boost de Desempenho</span>
          <label class="switch"><input type="checkbox" data-key="boost"><span></span></label>
        </article>
        <article class="setting-item" style="display: flex; justify-content: space-between; margin-bottom: 15px;">
          <span>Redução de Ping</span>
          <label class="switch"><input type="checkbox" data-key="ping"><span></span></label>
        </article>
        <article class="setting-item" style="display: flex; justify-content: space-between; margin-bottom: 15px;">
          <span>Perfil 120 FPS</span>
          <label class="switch"><input type="checkbox" data-key="fps120"><span></span></label>
        </article>
        <button id="resetButton" style="width: 100%; padding: 10px;">Resetar Configurações</button>
      </div>

      <hr style="border: 0.5px solid #333; margin: 20px;">

      <div class="ios-panel" style="padding: 20px; text-align: center;">
        <h3>Instalação iOS</h3>
        <p>Baixe o perfil para usar como App na tela de início.</p>
        <a class="download-profile-btn" href="./gvotimizacao-webclip.mobileconfig" style="display: inline-block; padding: 10px 20px; background: #fff; color: #000; text-decoration: none; border-radius: 5px;">Baixar Perfil</a>
        <p style="font-size: 12px; margin-top: 10px;">Após baixar, vá em Ajustes > Perfil Baixado.</p>
      </div>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    /* Configuração das Partículas Brancas */
    particlesJS('particles-js', {
      "particles": {
        "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#ffffff" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.5 },
        "size": { "value": 3, "random": true },
        "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.4, "width": 1 },
        "move": { "enable": true, "speed": 2, "direction": "none", "out_mode": "out" }
      },
      "interactivity": {
        "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } },
        "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 1 } } }
      }
    });

    /* Lógica de Troca de Abas */
    const tabs = document.querySelectorAll('.tab-button');
    const contents = document.querySelectorAll('.tab-content');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;

        tabs.forEach(t => t.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));

        tab.classList.add('active');
        document.getElementById(target).classList.add('active');
      });
    });
  </script>
  <script src="./app.js"></script>
</body>
</html>
