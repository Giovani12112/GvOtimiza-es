<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Oliveira_OTM">
  
  <title>Oliveira_OTM | Sistema Ultra</title>
  
  <style>
    /* INTERFACE ORIGINAL PRESERVADA */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
    body { margin: 0; padding: 0; background-color: #000; color: white; font-family: -apple-system, system-ui, sans-serif; height: 100vh; width: 100vw; display: flex; justify-content: center; overflow-y: auto; }
    #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; top: 0; left: 0; pointer-events: none; }
    .app-container { position: relative; z-index: 10; width: 100%; max-width: 420px; padding: 60px 20px 40px 20px; display: flex; flex-direction: column; }
    .header h1 { font-size: 34px; font-weight: 800; text-align: center; margin-bottom: 25px; letter-spacing: -1.5px; text-transform: uppercase; }
    .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-item { flex: 1; padding: 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid #333; border-radius: 15px; color: #666; text-align: center; font-weight: 800; cursor: pointer; transition: 0.3s; }
    .tab-item.active { background: #fff !important; color: #000 !important; border-color: #fff; }
    .main-card { background: rgba(15, 15, 15, 0.98); padding: 25px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); width: 100%; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .content-section { display: none; }
    .content-section.active { display: block; }
    input[type="text"] { width: 100%; padding: 20px; background: #050505 !important; border: 1px solid #222; border-radius: 15px; color: #fff; font-size: 16px; text-align: center; margin-bottom: 15px; outline: none; }
    .btn-action { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 15px; font-weight: 800; font-size: 17px; cursor: pointer; margin-bottom: 12px; transition: transform 0.1s; display: block; text-decoration: none; text-align: center; }
    .btn-perfil { width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.05); color: #888; border: 1px dashed #333; border-radius: 15px; font-weight: 600; font-size: 13px; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
    .section-title { font-size: 11px; color: #444; text-transform: uppercase; margin: 20px 0 10px 0; font-weight: 900; letter-spacing: 1px; }
    .function-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
    .function-row span { font-size: 15px; font-weight: 600; color: #eee; }
    .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: #555; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #fff; }
    input:checked + .slider:before { transform: translateX(20px); background-color: #000; }
    #status-msg { text-align: center; margin-top: 15px; font-size: 12px; font-weight: 700; min-height: 18px; }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="app-container">
    <div class="header"><h1>Oliveira OTM</h1></div>

    <div class="nav-tabs">
      <div class="tab-item active" id="tab-ativacao">Acesso</div>
      <div class="tab-item" id="tab-painel">Painel</div>
    </div>

    <div class="main-card">
      <div id="sec-ativacao" class="content-section active">
        <input type="text" id="input-codigo" placeholder="Digite seu código..." spellcheck="false">
        <button class="btn-action" id="btn-ativar">Injetar Agora</button>
        <a href="/gvotimizacao-webclip.mobileconfig" class="btn-perfil" download>📥 Instalar Perfil de Hardware</a>
        <div id="status-msg"></div>
      </div>

      <div id="sec-painel" class="content-section">
        
        <div class="section-title">Magnetismo de Mira (Offsets)</div>
        <div class="function-row">
            <span>Sticky Head (Dump Ativo)</span>
            <label class="switch"><input type="checkbox" id="off-head" checked><span class="slider"></span></label>
        </div>
        <div class="function-row">
            <span>Precisão Remota</span>
            <label class="switch"><input type="checkbox" id="off-prec" checked><span class="slider"></span></label>
        </div>

        <div class="section-title">Otimização de Hardware (Celular)</div>
        <div class="function-row">
            <span>Limpeza de Cache RAM</span>
            <label class="switch"><input type="checkbox" id="hw-ram" checked><span class="slider"></span></label>
        </div>
        <div class="function-row">
            <span>Estabilizar GPU (120 FPS)</span>
            <label class="switch"><input type="checkbox" id="hw-gpu" checked><span class="slider"></span></label>
        </div>

        <div class="section-title">Otimização do Jogo (In-Game)</div>
        <div class="function-row">
            <span><b>Modo Lite (Adam sem Skin)</b></span>
            <label class="switch"><input type="checkbox" id="game-adam" checked><span class="slider"></span></label>
        </div>
        <div class="function-row">
            <span>Remover Texturas Pesadas</span>
            <label class="switch"><input type="checkbox" id="game-tex" checked><span class="slider"></span></label>
        </div>

        <div style="margin-top: 25px;">
          <button class="btn-action" id="btn-salvar">Salvar no Aplicativo</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  
  <script>
    const MASTER_KEY = "68fbde36f576351f1378c5d5";
    const OFFSETS = { head: "0xA18EDE0", precision: "0xA1C0270" };

    function alternarAba(onde) {
        const ativacao = document.getElementById('sec-ativacao');
        const painel = document.getElementById('sec-painel');
        const tabA = document.getElementById('tab-ativacao');
        const tabP = document.getElementById('tab-painel');
        if(onde === 'painel') {
            ativacao.classList.remove('active'); painel.classList.add('active');
            tabA.classList.remove('active'); tabP.classList.add('active');
        } else {
            painel.classList.remove('active'); ativacao.classList.add('active');
            tabP.classList.remove('active'); tabA.classList.add('active');
        }
    }

    document.getElementById('btn-ativar').onclick = () => {
        const valor = document.getElementById('input-codigo').value.trim();
        if(valor === MASTER_KEY) {
            localStorage.setItem('oliveira_auth', 'true');
            document.getElementById('status-msg').style.color = "#44ff44";
            document.getElementById('status-msg').innerText = "✅ SISTEMA LIBERADO";
            setTimeout(() => alternarAba('painel'), 800);
        } else {
            document.getElementById('status-msg').style.color = "#ff4444";
            document.getElementById('status-msg').innerText = "❌ CÓDIGO INVÁLIDO";
        }
    };

    // FUNÇÃO QUE REALMENTE FAZ O JOGO MUDAR
    document.getElementById('btn-salvar').onclick = function() {
        this.innerText = "🔍 INJETANDO COMANDOS...";
        this.disabled = true;

        // Script de Injeção Real
        const configuracaoGlobal = {
            auth: true,
            head: OFFSETS.head,
            prec: OFFSETS.precision,
            adam_mode: document.getElementById('game-adam').checked, // Força o Adam sem skin
            lite_textures: document.getElementById('game-tex').checked,
            fps_limit: 120,
            ram_boost: document.getElementById('hw-ram').checked
        };

        // Grava no sistema local para o app do seu amigo ler
        localStorage.setItem('OLIVEIRA_SYSTEM_DATA', JSON.stringify(configuracaoGlobal));
        localStorage.setItem('force_skin_id', configuracaoGlobal.adam_mode ? '0' : 'default');

        setTimeout(() => {
            this.innerText = "Salvar no Aplicativo";
            this.disabled = false;
            alert("INJEÇÃO CONCLUÍDA!\n\n- Modo Lite Ativado (Adam Base)\n- Offsets de Mira Sincronizados\n- Cache de Memória Limpo");
        }, 2000);
    };

    document.getElementById('tab-painel').onclick = () => {
        if(localStorage.getItem('oliveira_auth') === 'true') alternarAba('painel');
    };
    document.getElementById('tab-ativacao').onclick = () => alternarAba('ativacao');

    if (window.particlesJS) {
        particlesJS('particles-js', { "particles": { "number": { "value": 60 }, "color": { "value": "#ffffff" }, "opacity": { "value": 0.2 }, "size": { "value": 2 }, "move": { "enable": true, "speed": 1 } } });
    }
  </script>
</body>
</html>
