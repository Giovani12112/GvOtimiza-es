<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Oliveira_OTM</title>
  
  <style>
    /* Reset Geral */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      padding: 0;
      background-color: #0d0d0d;
      color: white;
      font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    /* Camada das Partículas no Fundo */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: 1;
      top: 0;
      left: 0;
    }

    .app-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      padding: 60px 25px;
      display: flex;
      flex-direction: column;
    }

    .header h1 {
      font-size: 34px;
      font-weight: 800;
      text-align: center;
      margin: 0;
      letter-spacing: -1px;
    }

    /* Abas Superior */
    .tabs-container {
      display: flex;
      gap: 10px;
      margin: 30px 0;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: rgba(255, 255, 255, 0.05);
      color: #777;
      text-align: center;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }

    .tab.active {
      background: white;
      color: black;
      border-color: white;
    }

    /* Card de Ativação */
    .activation-card {
      background: rgba(255, 255, 255, 0.04);
      padding: 30px 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      text-align: center;
    }

    .instruction {
      color: #aaa;
      font-size: 15px;
      margin-bottom: 25px;
    }

    /* Campo de Código VAZIO (sem placeholder ou texto) */
    input[type="text"] {
      width: 100%;
      padding: 18px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #444;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      text-align: center;
      margin-bottom: 15px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #888;
    }

    /* Botão Activate */
    .btn-activate {
      width: 100%;
      padding: 18px;
      background: white;
      color: black;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      font-size: 17px;
      cursor: pointer;
      text-transform: capitalize;
    }

    .btn-activate:active {
      transform: scale(0.98);
      background: #e0e0e0;
    }

    #status-msg {
      margin-top: 15px;
      font-size: 13px;
      font-weight: 600;
      min-height: 1.2em;
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="app-wrapper">
    <div class="header">
      <h1>Oliveira_OTM</h1>
    </div>

    <div class="tabs-container">
      <div class="tab active" id="btn-ativacao">Ativação</div>
      <div class="tab" id="btn-painel">Painel OTM</div>
    </div>

    <div class="activation-card">
      <p class="instruction">Insira o seu código de acesso privado</p>
      
      <input type="text" id="input-codigo" autocomplete="off" spellcheck="false">
      
      <button class="btn-activate" id="btn-submit">Activate Agora</button>
      <div id="status-msg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
