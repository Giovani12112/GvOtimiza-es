<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Oliveira_OTM | Ultra Injector v3</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; }
    body { margin: 0; padding: 0; background-color: #0d1117; color: white; font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow-x: hidden; display: flex; justify-content: center; }
    #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; top: 0; left: 0; pointer-events: none; opacity: 0.1; }
    .app-container { position: relative; z-index: 10; width: 100%; max-width: 410px; padding: 30px 20px; display: flex; flex-direction: column; }
    .header h1 { font-size: 26px; font-weight: 900; text-align: center; margin-bottom: 25px; text-transform: uppercase; color: #00d2ff; }
    .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 15px; }
    .tab-item { flex: 1; padding: 12px; border-radius: 12px; color: #888; text-align: center; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 13px; }
    .tab-item.active { background: #00d2ff; color: #000; }
    .main-card { background: #161b22; padding: 20px; border-radius: 25px; border: 1px solid #30363d; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .content-section { display: none; }
    .content-section.active { display: block; }
    .section-title { font-size: 11px; color: #00d2ff; text-transform: uppercase; margin: 15px 0 10px 0; font-weight: 800; letter-spacing: 1.5px; }
    .function-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 15px; background: #21262d; margin-bottom: 8px; border-radius: 12px; }
    .function-row span { font-size: 14px; font-weight: 500; color: #c9d1d9; }
    .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #30363d; transition: .3s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: #fff; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #00d2ff; }
    input:checked + .slider:before { transform: translateX(20px); }
    .btn-apply { width: 100%; padding: 18px; background: #00d2ff; color: #000; border: none; border-radius: 18px; font-weight: 800; font-size: 16px; margin-top: 20px; cursor: pointer; }
    .btn-download { display: block; text-align: center; color: #00d2ff; text-decoration: none; font-size: 13px; font-weight: 700; margin-top: 15px; border: 1px solid #00d2ff; padding: 12px; border-radius: 15px; }
    input[type="text"] { width: 100%; padding: 18px; background: #0d1117; border: 1px solid #30363d; border-radius: 15px; color: #fff; text-align: center; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div id="particles-js"></div>
  <div class="app-container">
    <div class="header"><h1>Oliveira OTM V3</h1></div>
    <div class="nav-tabs">
      <div class="tab-item active" id="tab-ativacao" onclick="changeTab('ativacao')">Login</div>
      <div class="tab-item" id="tab-painel" onclick="changeTab('painel')">Configurações</div>
    </div>
    <div class="main-card">
      
      <div id="sec-ativacao" class="content-section active">
        <input type="text" id="token" placeholder="Token Master" spellcheck="false">
        <button class="btn-apply" id="btn-validar">Validar Acesso</button>
        <a href="Oliveira_V3_Assinado.mobileconfig" class="btn-download">📲 Instalar Perfil Verificado</a>
      </div>
      
      <div id="sec-painel" class="content-section">
        <div class="section-title">Engine Avançada (V3)</div>
        <div class="function-row"><span>Precisão 90% Tiro Capa</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
        <div class="function-row"><span>Calibração de Estabilidade</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
        <div class="function-row"><span>Correção de Eixo Vertical</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>

        <div class="section-title">Otimização iOS</div>
        <div class="function-row"><span>Destravar 120 FPS</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
        <div class="function-row"><span>Otimização de Memória</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
        <div class="function-row"><span>Boost de Desempenho</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
        <button class="btn-apply" id="btn-save">Aplicar Configurações</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    const KEY = "68fbde36f576351f1378c5d5";

    // Função de troca de abas com lógica de bloqueio
    function changeTab(to) {
      const isAuth = localStorage.getItem('auth') === 'true';
      if(to === 'painel' && !isAuth) {
        alert("Acesso Negado! Insira o Token Master.");
        return;
      }
      document.querySelectorAll('.content-section, .tab-item').forEach(e => e.classList.remove('active'));
      document.getElementById('sec-' + to).classList.add('active');
      document.getElementById('tab-' + to).classList.add('active');
    }

    // Escutador de clique direto para garantir o funcionamento
    document.getElementById('btn-validar').onclick = function() {
      const inputToken = document.getElementById('token').value.trim();
      if(inputToken === KEY) {
        localStorage.setItem('auth', 'true');[cite: 2]
        alert("ACESSO LIBERADO!");
        changeTab('painel');[cite: 2]
      } else {
        alert("Token Inválido!");
      }
    };

    document.getElementById('btn-save').onclick = function() {
      this.innerText = "APLICANDO...";
      setTimeout(() => {
        alert("✅ CONFIGURAÇÕES APLICADAS!\n\nO Free Fire será aberto agora.");[cite: 2]
        this.innerText = "Aplicar Configurações";
        window.location.href = "freefire://";[cite: 2]
      }, 2000);
    };

    // Auto-login ao carregar
    window.onload = () => {
      if(localStorage.getItem('auth') === 'true') {
        changeTab('painel');
      }
      particlesJS('particles-js', { "particles": { "number": { "value": 30 }, "opacity": { "value": 0.1 }, "size": { "value": 2 }, "move": { "enable": true, "speed": 1 } } });
    };
  </script>
</body>
</html>
