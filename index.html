<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Oliveira_OTM">
  
  <title>Oliveira_OTM | Offset Edition</title>
  
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
    
    body {
      margin: 0; padding: 0;
      background-color: #000;
      color: white;
      font-family: -apple-system, system-ui, sans-serif;
      height: 100vh; width: 100vw;
      display: flex; justify-content: center;
      overflow-y: auto;
    }

    #particles-js { 
      position: fixed; 
      width: 100%; height: 100%; 
      z-index: 1; top: 0; left: 0; 
      pointer-events: none; 
    }

    .app-container {
      position: relative; z-index: 10; width: 100%; max-width: 420px;
      padding: 60px 20px 40px 20px; display: flex; flex-direction: column;
    }

    .header h1 { font-size: 36px; font-weight: 800; text-align: center; margin-bottom: 25px; letter-spacing: -1.5px; }

    .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }

    .tab-item {
      flex: 1; padding: 14px; background: rgba(255, 255, 255, 0.05);
      border: 1px solid #333; border-radius: 12px; color: #777;
      text-align: center; font-weight: 700; cursor: pointer;
    }

    .tab-item.active { background: #fff !important; color: #000 !important; border-color: #fff; }

    .main-card {
      background: rgba(20, 20, 20, 0.95); padding: 25px; border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px);
      width: 100%; margin-bottom: 20px;
    }

    .content-section { display: none; }
    .content-section.active { display: block; }

    input[type="text"] {
      width: 100%; padding: 20px; background: #000 !important; border: 1px solid #333;
      border-radius: 15px; color: #fff; font-size: 18px; text-align: center; margin-bottom: 20px;
    }

    .btn-action {
      width: 100%; padding: 18px; background: #fff; color: #000; border: none;
      border-radius: 15px; font-weight: 800; font-size: 18px; cursor: pointer;
      margin-bottom: 12px;
    }

    .btn-perfil {
      width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.08); color: #fff; border: 1px dashed #444;
      border-radius: 15px; font-weight: 600; font-size: 13px; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .section-title { font-size: 12px; color: #555; text-transform: uppercase; margin: 15px 0 10px 0; font-weight: 800; }
    .function-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
    
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .3s; border-radius: 30px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #fff; }
    input:checked + .slider:before { transform: translateX(20px); background-color: #000; }

    #status-msg { text-align: center; margin-top: 15px; font-size: 13px; font-weight: 700; min-height: 15px; }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="app-container">
    <div class="header"><h1>Oliveira_OTM</h1></div>

    <div class="nav-tabs">
      <div class="tab-item active" id="tab-ativacao">Ativação</div>
      <div class="tab-item" id="tab-painel">Painel OTM</div>
    </div>

    <div class="main-card">
      <div id="sec-ativacao" class="content-section active">
        <p style="text-align:center; color:#888;">Injetor de Offsets Baseado no Dump</p>
        <input type="text" id="input-codigo" placeholder="Digite o código mestre..." spellcheck="false" autocomplete="off">
        <button class="btn-action" id="btn-ativar">Injetar Dump</button>
        
        <a href="/gvotimizacao-webclip.mobileconfig" class="btn-perfil">
          📥 Baixar Perfil de Ajuste Vertical
        </a>
        <div id="status-msg"></div>
      </div>

      <div id="sec-painel" class="content-section">
        <div class="section-title">Ajustes de Mira (DUMP)</div>
        <div class="function-row"><span>Grudar na Cabeça (Offset)</span><label class="switch"><input type="checkbox" class="otm-check" id="aim-head"> <span class="slider"></span></label></div>
        <div class="function-row"><span>Estabilizar no Pulo/Corrida</span><label class="switch"><input type="checkbox" class="otm-check" id="anti-shake"> <span class="slider"></span></label></div>
        <div class="function-row"><span>Controle de Recoil Dinâmico</span><label class="switch"><input type="checkbox" class="otm-check" id="recoil"> <span class="slider"></span></label></div>

        <div class="section-title">Performance</div>
        <div class="function-row"><span>Otimizar 120 FPS</span><label class="switch"><input type="checkbox" class="otm-check" id="boost-perf"> <span class="slider"></span></label></div>
        <div class="function-row"><span>Limpar RAM Pós-Dump</span><label class="switch"><input type="checkbox" class="otm-check" id="ram-clean"> <span class="slider"></span></label></div>
        
        <div style="margin-top: 20px;">
          <button class="btn-action" id="apply-btn">Salvar Alterações</button>
          <div id="apply-status" style="text-align:center; font-size:12px; margin-top:10px; color:#aaa;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  
  <script>
    const CODIGO_MESTRE = "68fbde36f576351f1378c5d5";
    // Endereços extraídos do seu dump para calibrar o sensor
    const DUMP_DATA = { head: "0xA18EDE0", aim: "0xA1C0270" };

    window.onload = () => {
        carregarConfiguracoes();
        particlesJS('particles-js', {
          "particles": { "number": { "value": 60 }, "color": { "value": "#ffffff" }, "opacity": { "value": 0.2 }, "size": { "value": 2 }, "line_linked": { "enable": true, "opacity": 0.1 }, "move": { "enable": true, "speed": 1 } }
        });
    };

    function carregarConfiguracoes() {
        const configs = JSON.parse(localStorage.getItem('user_configs') || '{}');
        document.querySelectorAll('.otm-check').forEach(cb => {
            if(configs[cb.id] !== undefined) cb.checked = configs[cb.id];
        });
    }

    document.getElementById('btn-ativar').onclick = () => {
      const val = document.getElementById('input-codigo').value.trim();
      const msg = document.getElementById('status-msg');
      if(val === CODIGO_MESTRE) {
        msg.style.color = "#44ff44";
        msg.innerText = "✅ DUMP INJETADO: OFFSET " + DUMP_DATA.head;
        localStorage.setItem('app_injetado', 'true');
        setTimeout(() => {
            document.getElementById('tab-painel').classList.add('active');
            document.getElementById('tab-ativacao').classList.remove('active');
            document.getElementById('sec-painel').classList.add('active');
            document.getElementById('sec-ativacao').classList.remove('active');
        }, 1200);
      } else {
        msg.style.color = "#ff4444";
        msg.innerText = "❌ CÓDIGO INVÁLIDO";
      }
    };

    document.getElementById('apply-btn').onclick = function() {
        const btn = this;
        btn.disabled = true;
        btn.innerText = "CALIBRANDO SENSORES...";
        
        const configs = {};
        document.querySelectorAll('.otm-check').forEach(cb => configs[cb.id] = cb.checked);
        localStorage.setItem('user_configs', JSON.stringify(configs));

        setTimeout(() => {
            document.getElementById('apply-status').innerText = "✅ OFFSETS APLICADAS AO HARDWARE!";
            btn.disabled = false;
            btn.innerText = "Salvar Alterações";
            alert("Sucesso! A estabilização de mira foi sincronizada com os offsets do dump.");
        }, 1500);
    };

    document.getElementById('tab-painel').onclick = () => {
        if(localStorage.getItem('app_injetado') !== 'true') {
            document.getElementById('status-msg').innerText = "❌ INJETE O DUMP PRIMEIRO";
        } else {
            document.getElementById('tab-painel').classList.add('active');
            document.getElementById('tab-ativacao').classList.remove('active');
            document.getElementById('sec-painel').classList.add('active');
            document.getElementById('sec-ativacao').classList.remove('active');
        }
    };

    document.getElementById('tab-ativacao').onclick = () => location.reload();
  </script>
</body>
</html>
