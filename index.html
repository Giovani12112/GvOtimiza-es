<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Oliveira_OTM</title>
    
    <link rel="stylesheet" href="style.css?v=60">
    
    <style>
        /* CORREÇÕES CRÍTICAS DE INTERFACE E ROLAGEM */
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #000 !important;
            color: #fff !important;
            overflow-y: auto !important; /* Libera o scroll para ver todas as funções */
            height: auto !important;
            min-height: 100vh;
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-overflow-scrolling: touch;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .app-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            padding-top: 25px;
            padding-bottom: 80px; /* Espaço para o botão de salvar não ficar escondido */
        }

        .main-card { 
            width: 92%; 
            max-width: 390px; 
            background: rgba(12, 12, 12, 0.98); 
            border-radius: 30px; 
            padding: 22px; 
            border: 1px solid #222; 
            box-sizing: border-box; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        }

        /* Controle de visibilidade das abas */
        .content-section { display: none; width: 100%; flex-direction: column; }
        .content-section.active { display: flex; }
        
        .function-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }

        .function-row span { font-size: 14px; color: #f0f0f0; }

        .btn-action { 
            width: 100%; 
            height: 54px; 
            border-radius: 15px; 
            border: none; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s;
            margin-top: 20px;
            background: #fff;
            color: #000;
        }

        .nav-tabs { display: flex; gap: 12px; margin-bottom: 30px; }
        .tab-item { padding: 10px 24px; border-radius: 12px; cursor: pointer; color: #666; border: 1px solid #222; transition: 0.3s; }
        .tab-item.active { background: #fff; color: #000; border: none; font-weight: bold; }

        /* Botão do Perfil iOS */
        .btn-perfil {
            display: block; 
            text-align: center; 
            color: #00e5ff; 
            text-decoration: none; 
            font-size: 13px; 
            margin-top: 20px; 
            border: 1px solid #222; 
            padding: 12px; 
            border-radius: 15px;
            background: rgba(0, 229, 255, 0.05);
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            height: 55px;
            background: #050505;
            border: 1px solid #333;
            border-radius: 15px;
            color: #fff;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="app-container">
        <h1 style="font-size: 32px; margin-bottom: 25px; font-weight: 900;">Oliveira_OTM</h1>

        <div class="nav-tabs">
            <div id="tab-ativacao" class="tab-item active">Ativação</div>
            <div id="tab-painel" class="tab-item">Painel OTM</div>
        </div>

        <div class="main-card">
            <div id="sec-ativacao" class="content-section active">
                <p style="color:#777; text-align:center; font-size: 13px; margin-bottom: 25px;">Insira seu código ID de acesso privado</p>
                <input type="text" id="input-codigo" placeholder="COLE O SEU CÓDIGO AQUI" spellcheck="false">
                <button id="btn-ativar" class="btn-action">Ativar Agora</button>
                <div id="status-msg" style="margin-top: 25px; text-align: center; font-size: 14px; font-weight: bold;"></div>
            </div>

            <div id="sec-painel" class="content-section">
                <div class="function-row"><span>Otimização de Memória</span><input type="checkbox"></div>
                <div class="function-row"><span>120 FPS Liberado</span><input type="checkbox"></div>
                <div class="function-row"><span>Mira Precision (HS)</span><input type="checkbox"></div>
                <div class="function-row"><span>Mira Estável (Zero Tremer)</span><input type="checkbox"></div>
                <div class="function-row"><span>Redução de Latência (Ping)</span><input type="checkbox"></div>
                <div class="function-row"><span>Remover Tremor da Mira</span><input type="checkbox"></div>
                <div class="function-row"><span>Otimização de Gráficos</span><input type="checkbox"></div>
                <div class="function-row"><span>Audio Customizado 3D</span><input type="checkbox"></div>
                
                <button id="btn-salvar" class="btn-action">Salvar Alterações</button>
                
                <div class="footer-download">
      <a href="gvotimizacao-webclip.mobileconfig" class="btn-download" download>
        ⬇️ Download Perfil
      </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="app.js?v=60"></script>
</body>
</html>
