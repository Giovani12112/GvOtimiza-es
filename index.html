<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Oliveira_OTM</title>
    
    <link rel="stylesheet" href="style.css?v=30">
    
    <style>
        /* ESTAS LINHAS LIBERAM O SCROLL */
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #000 !important;
            color: #fff !important;
            overflow-y: auto !important; /* PERMITE ROLAR PARA BAIXO */
            height: auto !important;
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
        }
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .app-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            padding-top: 25px;
            padding-bottom: 60px; /* ESPAÇO PARA NÃO CORTAR O BOTÃO SALVAR */
        }
        .content-section { display: none; width: 100%; flex-direction: column; }
        .content-section.active { display: flex; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="app-container">
        <h1 style="font-size: 32px; margin-bottom: 25px; font-weight: 900;">Oliveira_OTM</h1>

        <div class="nav-tabs">
            <div id="tab-ativacao" class="tab-item active">Ativação</div>
            <div id="tab-painel" class="tab-item">Painel OTM</div>
        </div>

        <div class="main-card">
            <div id="sec-ativacao" class="content-section active">
                <p style="color:#777; text-align:center; font-size: 13px; margin-bottom: 25px;">Insira seu código ID de acesso privado</p>
                <input type="text" id="input-codigo" placeholder="COLE O SEU CÓDIGO AQUI" style="width: 100%; height: 55px; background: #050505; border: 1px solid #333; border-radius: 15px; color: #fff; text-align: center; margin-bottom: 10px;">
                <button id="btn-ativar" class="btn-action btn-ativar">Ativar Agora</button>
                <div id="status-msg" style="margin-top: 25px; text-align: center; font-size: 14px; font-weight: bold;"></div>
            </div>

            <div id="sec-painel" class="content-section">
                <div class="function-row"><span>Otimização de Memória</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="function-row"><span>Boost de Desempenho</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="function-row"><span>120 FPS Liberado</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="function-row"><span>Mira Precision (Headshot)</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="function-row"><span>Mira Estável (Zero Tremer)</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="function-row"><span>Redução de Ping</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="function-row"><span>Remover Tremor da Mira</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="function-row"><span>Otimização de Gráficos</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                
                <button id="btn-salvar" class="btn-action btn-salvar">Salvar Alterações</button>
                
                <a href="gvotimizacao-webclip.mobileconfig" download class="btn-perfil" style="display: block; text-align: center; color: #00e5ff; text-decoration: none; margin-top: 20px; border: 1px solid #222; padding: 12px; border-radius: 15px; background: rgba(0, 229, 255, 0.05); font-weight: bold;">Baixar Perfil iOS</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="app.js?v=30"></script>
    
    <script>
        // REGISTRA O SERVICE WORKER COM VERSÃO NOVA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=30').then(() => {
                console.log("Sistema Oliveira_OTM Atualizado!");
            });
        }
    </script>
</body>
</html>
