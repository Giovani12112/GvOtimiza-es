<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Oliveira_OTM</title>
  
  <style>
    /* --- RESET TOTAL PARA O APP --- */
    * { 
        box-sizing: border-box; 
        -webkit-tap-highlight-color: transparent; 
        outline: none;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: #0d0d0d !important; /* Força o fundo preto */
      color: white;
      font-family: -apple-system, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    /* Fundo de partículas */
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: #0d0d0d;
      z-index: 1;
    }

    .app-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 60px 30px 30px 30px;
    }

    /* Título gvOtimização */
    .logo {
      font-size: 45px;
      font-weight: 900;
      text-align: center;
      margin: 0;
      color: #ffffff;
      letter-spacing: -2px;
      /* Remove qualquer sombra azul que existia antes */
      text-shadow: none; 
    }

    .instruction {
      text-align: center;
      color: #888;
      font-size: 18px;
      margin-top: 10px;
      margin-bottom: 50px;
    }

    /* Input Branco idêntico ao seu print */
    .input-box {
      width: 100%;
      padding: 22px;
      border-radius: 20px;
      border: none;
      background: #ffffff;
      color: #000;
      font-size: 18px;
      text-align: center;
      font-weight: 500;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Botão "Ativar Código" (Estilo Black & White) */
    .btn-activate {
      width: 100%;
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: #ffffff; /* Branco puro */
      color: #000;
      font-size: 18px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-activate:active {
      transform: scale(0.96);
      background: #e0e0e0;
    }

    /* Navegação Inferior */
    .bottom-nav {
      margin-top: auto;
      display: flex;
      gap: 15px;
    }

    .nav-item {
      flex: 1;
      padding: 16px;
      border-radius: 15px;
      border: 1px solid #333;
      background: rgba(255,255,255,0.05);
      color: white;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    /* Cor de destaque quando ativado */
    .nav-item.active {
      background: #ffffff;
      color: #000;
      border-color: #ffffff;
    }

    #msg-status {
      text-align: center;
      margin-top: 20px;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="app-wrapper">
    <h1 class="logo">Oliveira_OTM</h1>
    <p class="instruction">Insira seu código privado</p>

    <div id="activation-area">
      <input type="text" id="codeInput" placeholder="Coloque seu codigo aqui" autocomplete="off">
      <button class="btn-activate" onclick="verificar()">Ativar Código</button>
      <div id="msg-status"></div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item active">Funções</div>
      <div class="nav-item">iOS</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    // Configura as bolinhas brancas no fundo
    particlesJS('particles-js', {
      "particles": {
        "number": { "value": 60 },
        "color": { "value": "#ffffff" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.2 },
        "size": { "value": 3 },
        "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.1, "width": 1 },
        "move": { "enable": true, "speed": 1.5 }
      }
    });

    const CODIGO_CORRETO = "68fbde36f576351f1378c5d5";

    function verificar() {
        const input = document.getElementById('codeInput').value;
        const status = document.getElementById('msg-status');
        
        if (input.trim() === CODIGO_CORRETO) {
            status.style.color = "#ffffff";
            status.innerText = "ACESSO CONCEDIDO! REDIRECIONANDO...";
            localStorage.setItem('auth', 'true');
            // Aqui vai o comando para abrir suas funções
        } else {
            status.style.color = "#ff4444";
            status.innerText = "CÓDIGO INVÁLIDO";
        }
    }
  </script>
</body>
</html>
