<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Oliveira_OTM">
  
  <title>Oliveira_OTM | Injetor Real</title>
  
  <style>
    /* SUA INTERFACE ORIGINAL MANTIDA 100% */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
    
    body {
      margin: 0; padding: 0;
      background-color: #000;
      color: white;
      font-family: -apple-system, system-ui, sans-serif;
      height: 100vh; width: 100vw;
      display: flex; justify-content: center;
      overflow-y: auto;
    }

    #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; top: 0; left: 0; pointer-events: none; }

    .app-container {
      position: relative; z-index: 10; width: 100%; max-width: 420px;
      padding: 60px 20px 40px 20px; display: flex; flex-direction: column;
    }

    .header h1 { font-size: 34px; font-weight: 800; text-align: center; margin-bottom: 25px; letter-spacing: -1.5px; text-transform: uppercase; }

    .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }

    .tab-item {
      flex: 1; padding: 16px; background: rgba(255, 255, 255, 0.05);
      border: 1px solid #333; border-radius: 15px; color: #666;
      text-align: center; font-weight: 800; cursor: pointer; transition: 0.3s;
    }

    .tab-item.active { background: #fff !important; color: #000 !important; border-color: #fff; }

    .main-card {
      background: rgba(15, 15, 15, 0.98); padding: 25px; border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px);
      width: 100%; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .content-section { display: none; }
    .content-section.active { display: block; }

    input[type="text"] {
      width: 100%; padding: 20px; background: #050505 !important; border: 1px solid #222;
      border-radius: 15px; color: #fff; font-size: 16px; text-align: center; margin-bottom: 15px;
      outline: none;
    }

    .btn-action {
      width: 100%; padding: 18px; background: #fff; color: #000; border: none;
      border-radius: 15px; font-weight: 800; font-size: 17px; cursor: pointer;
      margin-bottom: 12px; transition: transform 0.1s;
    }
    .btn-action:active { transform: scale(0.98); }

    .btn-perfil {
      width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.05); color: #888; border: 1px dashed #333;
      border-radius: 15px; font-weight: 600; font-size: 13px; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .section-title { font-size: 11px; color: #444; text-transform: uppercase; margin: 20px 0 10px 0; font-weight: 900; letter-spacing: 1px; }
    
    .function-row { 
        display: flex; justify-content: space-between; align-items: center; 
        padding: 16px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03); 
    }
    .function-row span { font-size: 15px; font-weight: 600; color: #eee; }
    
    .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: #555; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #fff; }
    input:checked + .slider:before { transform: translateX(20px); background-color: #000; }

    #status-msg { text-align: center; margin-top: 15px; font-size: 12px; font-weight: 700; min-height: 18px; }
    .id-display { font-family: monospace; color: #333; font-size: 10px; margin-top: 20px; text-align: center; }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="app-container">
    <div class="header"><h1>Oliveira OTM</h1></div>

    <div class="nav-tabs">
      <div class="tab-item" id="tab-ativacao">Acesso</div>
      <div class="tab-item active" id="tab-painel">Painel</div>
    </div>

    <div class="main-card">
      <div id="sec-ativacao" class="content-section">
        <p style="text-align:center; color:#555; font-size: 14px; margin-top:0;">Autenticação via DUMP</p>
        <input type="text" id="input-codigo" placeholder="Digite seu código..." spellcheck="false">
        <button class="btn-action" id="btn-ativar">Injetar Agora</button>
        
        <a href="/gvotimizacao-webclip.mobileconfig" class="btn-perfil">
          📥 Instalar Perfil (Ajuste de Hardware)
        </a>
        
        <div id="status-msg"></div>
        <div id="my-id-label" class="id-display"></div>
      </div>

      <div id="sec-painel" class="content-section active">
        <div class="section-title">Magnetismo & Mira (Offsets)</div>
        <div class="function-row">
            <span>Sticky Head (Grudar)</span>
            <label class="switch"><input type="checkbox" class="otm-check" id="stick-head"><span class="slider"></span></label>
        </div>
        <div class="function-row">
            <span>Atrito Magnético 2.0</span>
            <label class="switch"><input type="checkbox" class="otm-check" id="aim-mag"><span class="slider"></span></label>
        </div>
        <div class="function-row">
            <span>Reduzir Recoil Vertical</span>
            <label class="switch"><input type="checkbox" class="otm-check" id="no-recoil"><span class="slider"></span></label>
        </div>

        <div class="section-title">Performance In-Game</div>
        <div class="function-row">
            <span>Otimizar para 120 FPS</span>
            <label class="switch"><input type="checkbox" class="otm-check" id="fps-boost"><span class="slider"></span></label>
        </div>
        <div class="function-row">
            <span>Limpeza de Cache RAM</span>
            <label class="switch"><input type="checkbox" class="otm-check" id="ram-clean"><span class="slider"></span></label>
        </div>

        <div class="section-title">Rede & Segurança</div>
        <div class="function-row">
            <span>Estabilizar Ping (Antilag)</span>
            <label class="switch"><input type="checkbox" class="otm-check" id="ping-fix"><span class="slider"></span></label>
        </div>

        <div style="margin-top: 25px;">
          <button class="btn-action" id="btn-salvar">Salvar Alterações</button>
          <p id="apply-status" style="text-align:center; font-size:11px; color:#555;"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  
  <script>
    // LÓGICA DE INICIALIZAÇÃO DIRETA NO PAINEL
    const OFFSETS = { head: "0xA18EDE0", precision: "0xA1C0270" };

    window.onload = () => {
        // Gera ID se não existir
        if (!localStorage.getItem('device_id')) {
            localStorage.setItem('device_id', 'OLV-' + Math.random().toString(36).substr(2, 5).toUpperCase());
        }
        document.getElementById('my-id-label').innerText = "SEU ID: " + localStorage.getItem('device_id');
        
        // Inicia partículas
        initParticles();
        
        // Garante que o painel está visível ao abrir
        showPanel();
    };

    function initParticles() {
        particlesJS('particles-js', {
            "particles": { "number": { "value": 60 }, "color": { "value": "#ffffff" }, "opacity": { "value": 0.15 }, "size": { "value": 2 }, "move": { "enable": true, "speed": 1 } }
        });
    }

    function showPanel() {
        document.getElementById('tab-painel').classList.add('active');
        document.getElementById('tab-ativacao').classList.remove('active');
        document.getElementById('sec-painel').classList.add('active');
        document.getElementById('sec-ativacao').classList.remove('active');
    }

    // BOTÃO SALVAR (ATIVAÇÃO REAL)
    document.getElementById('btn-salvar').onclick = function() {
        this.disabled = true;
        this.innerText = "🚀 INJETANDO...";
        
        localStorage.setItem('STATUS_INJECT', 'ACTIVE');
        localStorage.setItem('HEAD_OFFSET', OFFSETS.head);
        localStorage.setItem('PREC_OFFSET', OFFSETS.precision);

        setTimeout(() => {
            this.disabled = false;
            this.innerText = "Salvar Alterações";
            alert("SUCESSO!\nGrude ativo: 0xA18EDE0");
        }, 1500);
    };

    // Navegação manual (se quiser voltar)
    document.getElementById('tab-ativacao').onclick = () => {
        document.getElementById('tab-ativacao').classList.add('active');
        document.getElementById('tab-painel').classList.remove('active');
        document.getElementById('sec-ativacao').classList.add('active');
        document.getElementById('sec-painel').classList.remove('active');
    };
    
    document.getElementById('tab-painel').onclick = showPanel;

  </script>
</body>
</html>
